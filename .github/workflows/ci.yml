name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 같은 브랜치에서 새 푸시가 오면 진행 중인 실행을 취소
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (Testcontainers 실 DB)
    runs-on: ubuntu-latest   # 러너에 Docker가 있어 Testcontainers 실 Postgres가 동작
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & Test
        run: ./gradlew build --no-daemon

      - name: Upload test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/
          if-no-files-found: ignore
